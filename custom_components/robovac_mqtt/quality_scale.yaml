rules:
  # Bronze (18)
  action-setup:
    status: exempt
    comment: "Integration does not register integration-owned service actions; uses only entity services like vacuum.send_command"
  appropriate-polling: done
  brands:
    status: exempt
    comment: "HACS custom component — brands repository entries are for HA core integrations only. Logo/icon served via HACS repository metadata."
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  diagnostics: done
  docs-actions:
    status: exempt
    comment: "No integration-owned service actions to document; vacuum entity services are standard HA"
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done
  # Silver (10)
  action-exceptions:
    status: exempt
    comment: "No integration-owned service actions to raise exceptions from"
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done
  # Gold (22)
  async-dependency: done
  discovery:
    status: exempt
    comment: "Cloud-only integration, no local network discovery possible. Consistent with opower, ohme, trmnl platinum integrations."
  discovery-update-info:
    status: exempt
    comment: "Cloud-only integration, no local discovery info. Consistent with opower, ohme, trmnl platinum integrations."
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices: done
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  inject-websession: done
  log-once-on-failure: done
  options-flow: done
  reconfiguration-flow: done
  repair-issues: done
  runtime-data: done
  stale-devices: done
  strict-typing: done
  # Platinum (3)
  docs-device-trigger:
    status: exempt
    comment: "Integration does not expose device triggers"
  entity-platform-image:
    status: exempt
    comment: "No platform-specific images needed for vacuum entities"
  platinum: done
